name: Publish images

on:
  push:
    branches:
      - master
    paths-ignore:
      - deploy/k8s/overlays/prod/kustomization.yaml

permissions:
  contents: write
  packages: write

env:
  BACKEND_IMAGE_NAME: ghcr.io/yeominsoo/mongtorydiary-backend
  FRONTEND_IMAGE_NAME: ghcr.io/yeominsoo/mongtorydiary-frontend
  DEPLOY_PATH: deploy/k8s/overlays/prod

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: mongtorydiary-master-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE_NAME }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE_NAME }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update deployment image tags
        run: |
          cd "${DEPLOY_PATH}"
          kustomize edit set image "${BACKEND_IMAGE_NAME}=${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          kustomize edit set image "${FRONTEND_IMAGE_NAME}=${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"

      - name: Commit deployment manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOY_PATH}/kustomization.yaml"
          git diff --cached --quiet && exit 0
          git commit -m "deploy(mongtorydiary): ${GITHUB_SHA} [skip ci]"
          git push
