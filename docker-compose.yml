services:
  db:
    image: postgres:16-alpine
    container_name: mongtory-diary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mongtorydiary
      POSTGRES_USER: mongtory
      POSTGRES_PASSWORD: mongtory-local-password
    volumes:
      - mongtory_diary_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mongtory -d mongtorydiary"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mongtory-diary-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mongtorydiary
      SPRING_DATASOURCE_USERNAME: mongtory
      SPRING_DATASOURCE_PASSWORD: mongtory-local-password
      MONGTORY_UPLOAD_ROOT_DIR: /app/data/uploads
    ports:
      - "30081:30081"
    volumes:
      - mongtory_diary_uploads:/app/data/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mongtory-diary-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "30080:30080"

volumes:
  mongtory_diary_pgdata:
  mongtory_diary_uploads:
