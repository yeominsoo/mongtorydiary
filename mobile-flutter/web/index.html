<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mongtory Diary">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mongtory_diary">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mongtory Diary</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #f7f2ec;
    }

    .boot-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(247, 242, 236, 0.92)),
        #f7f2ec;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .boot-screen.is-complete {
      opacity: 0;
      visibility: hidden;
    }

    .boot-panel {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid rgba(72, 55, 43, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 48px rgba(61, 45, 33, 0.12);
    }

    .boot-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: #382b21;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .boot-mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #8f5f3f;
      color: #fffaf5;
      font-weight: 900;
    }

    .boot-status {
      margin: 0 0 14px;
      color: #5d4b3f;
      font-size: 15px;
      line-height: 1.5;
    }

    .boot-track {
      overflow: hidden;
      height: 8px;
      border-radius: 999px;
      background: #e8d9cb;
    }

    .boot-bar {
      width: 14%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #8f5f3f, #2f776d);
      transition: width 260ms ease;
    }

    .boot-detail {
      margin: 12px 0 0;
      color: #78675b;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="mongtory-boot" class="boot-screen" role="status" aria-live="polite">
    <div class="boot-panel">
      <div class="boot-brand">
        <div class="boot-mark">몽</div>
        <div>Mongtory Diary</div>
      </div>
      <p id="mongtory-boot-status" class="boot-status">앱을 준비하는 중입니다.</p>
      <div class="boot-track" aria-hidden="true">
        <div id="mongtory-boot-bar" class="boot-bar"></div>
      </div>
      <p id="mongtory-boot-detail" class="boot-detail">첫 접속에서는 달력과 일기 데이터를 준비하는 데 시간이 걸릴 수 있습니다.</p>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
