apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: mongtorydiary
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongtorydiary
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongtorydiary
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/yeominsoo/mongtorydiary-backend:master
          ports:
            - name: http
              containerPort: 30081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db:5432/mongtorydiary
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongtorydiary-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongtorydiary-db-secret
                  key: password
            - name: MONGTORY_UPLOAD_ROOT_DIR
              value: /app/data/uploads
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
